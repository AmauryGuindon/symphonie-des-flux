<div class="admin-shell" [class.sidebar-open]="sidebarOpen()">

  <!-- Mobile topbar -->
  <div class="admin-topbar">
    <button class="admin-topbar__burger" (click)="sidebarOpen.set(!sidebarOpen())" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <span class="admin-topbar__title">DANY<span>1ST</span></span>
  </div>

  <!-- Overlay -->
  <div class="admin-overlay" (click)="sidebarOpen.set(false)"></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <span class="admin-sidebar__brand-name">DANY<span>1ST</span></span>
      <span class="admin-sidebar__brand-label">Backoffice</span>
    </div>

    <nav class="admin-sidebar__nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="admin-sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a routerLink="/admin/clients" routerLinkActive="active" class="admin-sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clients
      </a>
      <a routerLink="/admin/loyalty" routerLinkActive="active" class="admin-sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Fidélité
      </a>
      <a routerLink="/admin/referrals" routerLinkActive="active" class="admin-sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Parrainages
      </a>
      <a routerLink="/admin/appointments" routerLinkActive="active" class="admin-sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Rendez-vous
      </a>
      <a routerLink="/admin/schedule" routerLinkActive="active" class="admin-sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Horaires
      </a>
      <a routerLink="/admin/comptabilite" routerLinkActive="active" class="admin-sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Comptabilité
      </a>
      <a routerLink="/admin/prestations" routerLinkActive="active" class="admin-sidebar__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Prestations
      </a>
    </nav>

    <div class="admin-sidebar__footer">
      <span class="admin-sidebar__user">{{ auth.user()?.firstName }} {{ auth.user()?.lastName }}</span>
      <button class="admin-sidebar__logout" (click)="logout()">Déconnexion</button>
    </div>
  </aside>

  <!-- Contenu principal -->
  <main class="admin-main">
    <router-outlet />
  </main>

</div>
