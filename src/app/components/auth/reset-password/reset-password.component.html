<section class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">
      <a routerLink="/"><span style="font-weight:800;font-size:1.4rem;letter-spacing:2px">DATA<span style="color:#c9a84c">CUT</span></span></a>
    </div>

    <div class="auth-card__header">
      <span class="section-label">Espace Client</span>
      <h1 class="auth-card__title">NOUVEAU<br>MOT DE PASSE</h1>
      <div class="gold-divider"></div>
    </div>

    @if (done()) {
      <div class="auth-form__success">
        <p>Votre mot de passe a été mis à jour avec succès.</p>
      </div>
      <p class="auth-card__switch"><a routerLink="/login">← Se connecter</a></p>
    } @else {
      <form class="auth-form" (ngSubmit)="submit()">
        <div class="auth-form__field">
          <label>Nouveau mot de passe</label>
          <input type="password" [(ngModel)]="password" name="password"
            placeholder="••••••••" autocomplete="new-password" required />
        </div>

        <div class="auth-form__field">
          <label>Confirmer le mot de passe</label>
          <input type="password" [(ngModel)]="confirm" name="confirm"
            placeholder="••••••••" autocomplete="new-password" required />
        </div>

        @if (error()) {
          <p class="auth-form__error">{{ error() }}</p>
        }

        <button type="submit" class="auth-form__submit" [class.loading]="loading()" [disabled]="!token">
          @if (loading()) {
            <span class="auth-form__spinner"></span>
          } @else {
            <span>Mettre à jour</span>
            <span class="auth-form__arrow">→</span>
          }
        </button>
      </form>
    }
  </div>
</section>
