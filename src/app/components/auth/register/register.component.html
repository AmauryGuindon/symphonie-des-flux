<section class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">
      <a routerLink="/">
        <img src="assets/logo/logo_dany1st.webp" alt="Dany1st" />
      </a>
    </div>

    <div class="auth-card__header">
      <span class="section-label">Espace Client</span>
      <h1 class="auth-card__title">INSCRIPTION</h1>
      <div class="gold-divider"></div>
    </div>

    <form class="auth-form" (ngSubmit)="submit()">
      <div class="auth-form__row">
        <div class="auth-form__field">
          <label>Prénom <span class="req">*</span></label>
          <input type="text" [(ngModel)]="form.firstName" name="firstName" placeholder="Prénom" required />
        </div>
        <div class="auth-form__field">
          <label>Nom <span class="req">*</span></label>
          <input type="text" [(ngModel)]="form.lastName" name="lastName" placeholder="Nom" required />
        </div>
      </div>

      <div class="auth-form__field">
        <label>Email <span class="req">*</span></label>
        <input type="email" [(ngModel)]="form.email" name="email" placeholder="votre@email.com" required />
      </div>

      <div class="auth-form__field">
        <label>Mot de passe <span class="req">*</span></label>
        <input type="password" [(ngModel)]="form.password" name="password" placeholder="Min. 8 caractères" required />
      </div>

      <div class="auth-form__field">
        <label>Téléphone</label>
        <input type="tel" [(ngModel)]="form.phone" name="phone" placeholder="06 XX XX XX XX" />
      </div>

      <div class="auth-form__row">
        <div class="auth-form__field">
          <label>Date de naissance <span class="req">*</span></label>
          <input type="date" [(ngModel)]="form.birthDate" name="birthDate" required />
        </div>
        <div class="auth-form__field">
          <label>Code parrainage</label>
          <input
            type="text"
            [(ngModel)]="form.referralCode"
            name="referralCode"
            placeholder="Ex: A1B2C3D4"
            maxlength="8"
            style="text-transform: uppercase"
          />
        </div>
      </div>

      @if (error()) {
        <p class="auth-form__error">{{ error() }}</p>
      }

      <button type="submit" class="auth-form__submit" [class.loading]="loading()">
        @if (loading()) {
          <span class="auth-form__spinner"></span>
        } @else {
          <span>Créer mon compte</span>
          <span class="auth-form__arrow">→</span>
        }
      </button>
    </form>

    <div class="auth-divider"><span>ou</span></div>

    <button type="button" class="auth-google" (click)="registerWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
      </svg>
      Continuer avec Google
    </button>

    <p class="auth-card__switch">
      Déjà un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</section>
